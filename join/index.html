<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>El juego de los Chinos</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f8f9fa;
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
    }
    .topbar {
      width: 100%; background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 12px 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .topbar svg { flex-shrink: 0; }
    .topbar-title {
      font-size: 18px; font-weight: 500; color: #202124;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      margin: 20px 16px;
      max-width: 480px; width: calc(100% - 32px);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .card-header {
      padding: 20px;
      display: flex; gap: 16px; align-items: flex-start;
    }
    .app-icon {
      width: 80px; height: 80px;
      border-radius: 18px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .app-info { flex: 1; }
    .app-name {
      font-size: 18px; font-weight: 700;
      color: #202124; line-height: 1.2; margin-bottom: 4px;
    }
    .app-dev {
      font-size: 13px; color: #01875F; font-weight: 500; margin-bottom: 4px;
    }
    .app-meta { font-size: 12px; color: #70757a; }
    .divider { height: 1px; background: #f0f0f0; margin: 0 20px; }
    .invite-section { padding: 20px; }
    .invite-title {
      font-size: 13px; color: #70757a;
      text-transform: uppercase; letter-spacing: 0.8px;
      font-weight: 500; margin-bottom: 6px;
    }
    .room-name {
      font-size: 16px; font-weight: 600; color: #202124; margin-bottom: 16px;
    }
    .code-label {
      font-size: 13px; color: #70757a;
      text-transform: uppercase; letter-spacing: 0.8px;
      font-weight: 500; margin-bottom: 8px;
    }
    .code {
      font-size: 40px; font-weight: 900;
      letter-spacing: 12px; color: #202124;
      background: #f8f9fa;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      padding: 16px 8px; text-align: center;
      margin-bottom: 20px;
    }
    .btn-install {
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      background: #01875F; color: #fff;
      border-radius: 24px; padding: 14px 24px;
      text-decoration: none;
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.3px;
      width: 100%;
      transition: background .15s;
    }
    .btn-install:hover { background: #016D4C; }
    .hint {
      font-size: 12px; color: #70757a;
      text-align: center; margin-top: 14px; line-height: 1.6;
    }
    .screenshots {
      display: flex; gap: 8px; padding: 16px 20px;
      overflow-x: auto;
    }
    .screenshots img {
      height: 120px; border-radius: 8px;
      border: 1px solid #e0e0e0; flex-shrink: 0;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const p = new URLSearchParams(window.location.search);
      const code = p.get('code') || '——';
      const room = p.get('room') ? decodeURIComponent(p.get('room')) : '';
      document.getElementById('code').textContent = code;
      if (room) {
        document.getElementById('room-name').textContent = room;
        document.getElementById('room-section').style.display = 'block';
      }
    });
  </script>
</head>
<body>

  <!-- Barra superior estilo Google Play -->
  <div class="topbar">
    <svg width="72" height="24" viewBox="0 0 72 24" fill="none">
      <path d="M8.5 3L1 12l7.5 9V3z" fill="#EA4335"/>
      <path d="M8.5 3l10 9-10 9V3z" fill="#FBBC04"/>
      <path d="M1 12l7.5-9h10L1 12z" fill="#4285F4"/>
      <path d="M1 12l17.5 9H8.5L1 12z" fill="#34A853"/>
      <text x="24" y="17" font-family="Roboto,sans-serif" font-size="14" font-weight="500" fill="#202124">Google Play</text>
    </svg>
  </div>

  <div class="card">
    <!-- Cabecera con icono e info -->
    <div class="card-header">
      <img class="app-icon"
           src="/game icon.png"
           alt="El juego de los Chinos">
      <div class="app-info">
        <div class="app-name">El juego de los Chinos</div>
        <div class="app-dev">TiTo Gaming Company</div>
        <div class="app-meta">PEGI 3 · Juegos de cartas</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Invitación -->
    <div class="invite-section">
      <div id="room-section" style="display:none">
        <div class="invite-title">Sala</div>
        <div class="room-name" id="room-name"></div>
      </div>
      <div class="code-label">Código de sala</div>
      <div class="code" id="code">——</div>
      <a class="btn-install"
         href="https://play.google.com/store/apps/details?id=com.titogamingcompany.juego_chinos">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M3.18 23.76c.3.17.64.24.99.2l12.6-11.6L13.1 8.7 3.18 23.76z"/>
          <path d="M20.96 10.1l-2.94-1.7-3.77 3.47 3.77 3.47 2.97-1.72a1.64 1.64 0 0 0 0-2.84l-.03-.48z"/>
          <path d="M3.18.24A1.64 1.64 0 0 0 2.5 1.6v20.8c0 .56.28 1.05.68 1.36L13.1 13.3 3.18.24z" opacity=".8"/>
          <path d="M4.17.04 13.1 8.7l3.67-3.37L4.17.04z" opacity=".6"/>
        </svg>
        Instalar en Google Play
      </a>
      <p class="hint">
        ¿Ya tienes el juego instalado?<br>
        ábrelo y usa el código de arriba para unirte o actualiza la aplicación.
      </p>
    </div>
  </div>
</body>
</html>

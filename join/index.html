<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>El juego de los Chinos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #f1f3f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .app-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      flex-shrink: 0;
    }
    .app-title {
      font-size: 17px;
      font-weight: 700;
      color: #202124;
      line-height: 1.2;
    }
    .app-dev {
      font-size: 13px;
      color: #01875F;
      font-weight: 500;
      margin-top: 3px;
    }
    .app-meta {
      font-size: 12px;
      color: #70757a;
      margin-top: 2px;
    }
    .body {
      padding: 20px;
      text-align: center;
    }
    .label {
      font-size: 11px;
      font-weight: 600;
      color: #70757a;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }
    .room-name {
      font-size: 16px;
      font-weight: 600;
      color: #202124;
      margin-bottom: 18px;
    }
    .code-box {
      background: #f8f9fa;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      padding: 14px 8px;
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 12px;
      color: #202124;
      margin-bottom: 20px;
      text-align: center;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #01875F;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .btn:hover { background: #016D4C; }
    .btn-logo {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .hint {
      font-size: 12px;
      color: #9aa0a6;
      text-align: center;
      margin-top: 14px;
      line-height: 1.6;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var p = new URLSearchParams(window.location.search);
      var code = p.get('code') || '\u2014\u2014';
      var room = p.get('room') ? decodeURIComponent(p.get('room')) : '';
      document.getElementById('code').textContent = code;
      if (room) {
        document.getElementById('room-name').textContent = room;
        document.getElementById('room-section').style.display = 'block';
      }
    });
  </script>
</head>
<body>
  <div class="card">

    <div class="header">
      <img class="app-icon" src="/game icon.png" alt="El juego de los Chinos">
      <div>
        <div class="app-title">El juego de los Chinos</div>
        <div class="app-dev">TiTo Gaming Company</div>
        <div class="app-meta">PEGI 3 &middot; Juegos casuales</div>
      </div>
    </div>

    <div class="body">

      <div id="room-section" style="display:none; margin-bottom:4px;">
        <div class="label">Sala</div>
        <div class="room-name" id="room-name"></div>
      </div>

      <div class="label">C&oacute;digo de sala</div>
      <div class="code-box" id="code">&mdash;&mdash;</div>

      <a class="btn"
         href="https://play.google.com/store/apps/details?id=com.titogamingcompany.juego_chinos">
        <!-- Icono Google Play con colores oficiales -->
        <svg width="20" height="22" viewBox="0 0 20 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0.5 1.2 L0.5 20.8 L11.2 11 Z" fill="#4285F4"/>
          <path d="M0.5 1.2 L11.2 11 L14.8 7.5 L2.8 0.3 Q1.5 -0.3 0.5 1.2Z" fill="#34A853"/>
          <path d="M0.5 20.8 Q1.5 22.3 2.8 21.7 L14.8 14.5 L11.2 11 Z" fill="#EA4335"/>
          <path d="M11.2 11 L14.8 14.5 L18.8 12.1 Q20.5 11.1 20.5 11 Q20.5 10.9 18.8 9.9 L14.8 7.5 Z" fill="#FBBC04"/>
        </svg>
        Instalar en Google Play
      </a>

      <p class="hint">
        ¿Ya tienes el juego instalado?<br>
        Ábrelo y usa el código de arriba para unirte o actualiza la aplicación.
      </p>

    </div>
  </div>
</body>
</html>
